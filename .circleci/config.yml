version: 2.1

orbs:
  node: circleci/node@7.2.1

jobs:
  test:
    executor: node/default
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          command: npm run test
          name: Run tests

workflows:
  build_test_deploy:
    jobs:
      - test
